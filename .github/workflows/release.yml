name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if release exists for current version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep '^version=' version.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

          if gh release view "v${VERSION}" &>/dev/null; then
            echo "Release v${VERSION} already exists — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release found for v${VERSION} — will create."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('SonyCameraX/**/*.gradle', 'SonyCameraXposed/**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build SonyCameraX APK (debug testbed)
        working-directory: SonyCameraX
        run: ./gradlew assembleDebug

      - name: Build SonyCameraXposed APK
        working-directory: SonyCameraXposed
        run: ./gradlew assembleRelease

      - name: Upload SonyCameraX APK
        uses: actions/upload-artifact@v4
        with:
          name: SonyCameraX
          path: SonyCameraX/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload SonyCameraXposed APK
        uses: actions/upload-artifact@v4
        with:
          name: SonyCameraXposed
          path: SonyCameraXposed/app/build/outputs/apk/release/app-release-unsigned.apk

  release:
    needs: [check-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          cp artifacts/SonyCameraX/app-debug.apk sony-camerax-debug-v${VERSION}.apk
          cp artifacts/SonyCameraXposed/app-release-unsigned.apk sony-camera-unlocker-v${VERSION}.apk

      - name: Generate release notes
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          {
            echo "## Sony Camera Unlocker v${VERSION}"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              COMMIT_COUNT=$(git rev-list --count "${PREV_TAG}..HEAD")
              FILE_COUNT=$(git diff --name-only "${PREV_TAG}..HEAD" | wc -l | tr -d ' ')
              echo "**${COMMIT_COUNT} commits**, **${FILE_COUNT} files changed** since ${PREV_TAG}"
            else
              COMMIT_COUNT=$(git rev-list --count HEAD)
              echo "**${COMMIT_COUNT} commits** (initial release)"
            fi
            echo ""

            echo "### Artifacts"
            echo ""
            echo "| File | Description |"
            echo "| --- | --- |"
            echo "| \`sony-camera-unlocker-v${VERSION}.apk\` | LSPosed module + settings UI — install this |"
            echo "| \`sony-camerax-debug-v${VERSION}.apk\` | Developer testbed app (debug build, Camera2 reference) |"
            echo ""

            echo "### Changes"

            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..HEAD"
            else
              RANGE="HEAD"
            fi

            FEATS=$(git log --pretty=format:"- %s" --no-merges "$RANGE" | grep -iE "^- (add|feat|new|support|implement)" | head -20)
            if [ -n "$FEATS" ]; then
              echo ""
              echo "**New Features**"
              echo "$FEATS"
            fi

            FIXES=$(git log --pretty=format:"- %s" --no-merges "$RANGE" | grep -iE "^- (fix|bug|patch|resolve|correct)" | head -20)
            if [ -n "$FIXES" ]; then
              echo ""
              echo "**Bug Fixes**"
              echo "$FIXES"
            fi

            OTHER=$(git log --pretty=format:"- %s (%h)" --no-merges "$RANGE" | grep -viE "^- (add|feat|new|support|implement|fix|bug|patch|resolve|correct)" | head -20)
            if [ -n "$OTHER" ]; then
              echo ""
              echo "**Other**"
              echo "$OTHER"
            fi

            echo ""
            echo "---"
            echo "*Built from \`${GITHUB_SHA::8}\` on $(date -u +%Y-%m-%d)*"
          } > /tmp/release_notes.md

          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.check-release.outputs.version }}"
          name: "Sony Camera Unlocker v${{ needs.check-release.outputs.version }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(needs.check-release.outputs.version, '-') }}
          files: |
            sony-camera-unlocker-v${{ needs.check-release.outputs.version }}.apk
            sony-camerax-debug-v${{ needs.check-release.outputs.version }}.apk
